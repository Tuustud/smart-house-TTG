<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart House System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <header>
        <h1>Welcome to the Smart House System</h1>
    </header>
    <main>
        <section id="controls">
            <h2>LED Control</h2>
            <button id="led-on">Turn LED On</button>
            <button id="led-off">Turn LED Off</button>
            <button id="led-toggle">Toggle LED</button>
        </section>
        <section id="status">
            <h2>LED Status</h2>
            <div id="led-status">Loading status...</div>
        </section>
    </main>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
